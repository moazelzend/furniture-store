<script>
const sheetURL =
"https://script.google.com/macros/s/AKfycbxO-pvTB451KYuK7TmWRe5fO_vWfVyV4ln69lDN9h9ksksx_OqtPVTk2KLRPDBqBwGH1w/exec";

window.onload = function(){

  const params =
    new URLSearchParams(window.location.search);

  const autoId =
    params.get("orderId");

  if(autoId){
    document.getElementById("orderId").value = autoId;
    setTimeout(trackOrder,300);
  }

};

function trackOrder(){

  const id =
    document.getElementById("orderId").value.trim();

  const result =
    document.getElementById("result");

  if(!id){
    result.innerHTML =
      "<p class='text-red-500'>أدخل رقم الطلب</p>";
    return;
  }

  result.innerHTML = "جاري البحث...";

  const callbackName =
    "cb_" + Date.now();

  window[callbackName] = function(data){

    if(data.result === "not_found"){
      result.innerHTML =
        "<p class='text-red-500'>الطلب غير موجود</p>";
    }
    else if(data.result === "found"){
      result.innerHTML = `
        <div class="bg-green-50 p-6 rounded-2xl">
          <p class="mb-3">رقم الطلب: <b>${data.orderId}</b></p>
          <p class="mb-3">الحالة: <b>${data.status}</b></p>
          <p class="mb-3">الاسم: <b>${data.name}</b></p>
          <p class="mb-3">المنتجات: <b>${data.products}</b></p>
          <p>الإجمالي: <b>${data.total} ج.م</b></p>
        </div>
      `;
    } else {
      result.innerHTML =
        "<p class='text-red-500'>حدث خطأ</p>";
    }

    delete window[callbackName];
    script.remove();
  };

  const script =
    document.createElement("script");

  script.onerror = function(){
    result.innerHTML =
      "<p class='text-red-500'>فشل الاتصال بالسيرفر</p>";
    delete window[callbackName];
    script.remove();
  };

  script.src =
    sheetURL +
    "?orderId=" + encodeURIComponent(id) +
    "&callback=" + callbackName;

  document.body.appendChild(script);
}
</script>
