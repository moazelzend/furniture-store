<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تتبع الطلب | Era&Art</title>

<script src="https://cdn.tailwindcss.com"></script>

<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">

<style>
body{
  font-family:'Tajawal',sans-serif;
  background:#f8f6f2;
}
</style>
</head>

<body class="min-h-screen flex items-center justify-center p-6">

<div class="bg-white shadow-2xl rounded-3xl p-10 w-full max-w-xl">

  <h1 class="text-4xl font-black text-center mb-8">
    تتبع الطلب
  </h1>

  <input
    id="orderId"
    type="text"
    placeholder="أدخل رقم الطلب"
    class="w-full border p-4 rounded-xl mb-5 text-center text-xl">

  <button
    onclick="trackOrder()"
    class="w-full bg-amber-700 text-white py-4 rounded-xl font-black text-xl hover:bg-amber-800 transition">
    بحث
  </button>

  <div id="result" class="mt-8 text-center"></div>

</div>

<script>

<script>
const sheetURL =
"https://script.google.com/macros/s/AKfycbwlh80sYiERi81R76-9MCwduYoOm7C6c770mQh6aaW3HhK_qdTLxjAdj-UAnyjZNlAM8w/exec";

function escapeHTML(str){
  return String(str)
    .replace(/&/g,"&amp;")
    .replace(/</g,"&lt;")
    .replace(/>/g,"&gt;")
    .replace(/"/g,"&quot;");
}

function trackOrder(){

  const orderId =
  document.getElementById("orderId").value.trim();

  const result =
  document.getElementById("result");

  if(!orderId){
    alert("أدخل رقم الطلب");
    return;
  }

  result.innerHTML =
  `<p class="text-gray-500 text-xl">جاري البحث...</p>`;

  const callbackName =
  "jsonp_callback_" + Date.now();

  window[callbackName] = function(data){

    if(data.result === "not_found"){
      result.innerHTML =
      `<p class="text-red-500 text-2xl font-black">
      الطلب غير موجود
      </p>`;
    }else{
      result.innerHTML = `
      <div class="bg-gray-50 rounded-2xl p-6 text-right space-y-4">
      <h2 class="text-3xl font-black text-amber-700 text-center">
      ${escapeHTML(data.status)}
      </h2>

      <p><b>الاسم:</b> ${escapeHTML(data.name)}</p>
      <p><b>المنتجات:</b> ${escapeHTML(data.products)}</p>
      <p><b>الإجمالي:</b> ${escapeHTML(data.total)} ج.م</p>
      </div>`;
    }

    delete window[callbackName];
    script.remove();
  };

  const script =
  document.createElement("script");

  script.src =
  sheetURL +
  "?orderId=" + encodeURIComponent(orderId) +
  "&callback=" + callbackName;

  document.body.appendChild(script);
}
</script>

</body>
</html>
