<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>تتبع الطلب | Era&Art</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 min-h-screen flex items-center justify-center p-4">

  <div class="bg-white p-8 rounded-3xl shadow-xl w-full max-w-lg">

    <h1 class="text-4xl font-black text-center mb-6">
      تتبع الطلب
    </h1>

    <input
      id="orderId"
      type="text"
      placeholder="رقم الطلب"
      class="w-full border p-4 rounded-xl mb-4 text-center">

    <button
      onclick="trackOrder()"
      class="w-full bg-amber-700 text-white py-4 rounded-xl font-black">
      بحث
    </button>

    <div id="result" class="mt-6 text-center text-xl"></div>

  </div>

<script>
const sheetURL =
"https://script.google.com/macros/library/d/1Q-E--azXjOth4HcfaRHQeJLx_2EXqvRDDjuuyghjaPjpbxTaL67SWQyb/24";

/* بعد تحميل الصفحة */
document.addEventListener("DOMContentLoaded", function () {

  const params =
    new URLSearchParams(window.location.search);

  const autoId =
    params.get("orderId");

  if(autoId){
    const input =
      document.getElementById("orderId");

    if(input){
      input.value = autoId;
      setTimeout(trackOrder, 300);
    }
  }

});

function trackOrder(){

  const input =
    document.getElementById("orderId");

  const result =
    document.getElementById("result");

  const id =
    input.value.trim();

  if(!id){
    result.innerHTML =
      "<p class='text-red-500'>أدخل رقم الطلب</p>";
    return;
  }

  result.innerHTML =
    "جاري البحث...";

  const callbackName =
    "cb_" + Date.now();

  window[callbackName] = function(data){

    if(data.result === "not_found"){

      result.innerHTML =
        "<p class='text-red-500'>الطلب غير موجود</p>";

    } else if(data.result === "found"){

      result.innerHTML = `
        <div class="bg-green-50 p-6 rounded-2xl text-right">
          <p class="mb-3"><b>رقم الطلب:</b> ${data.orderId}</p>
          <p class="mb-3"><b>الحالة:</b> ${data.status}</p>
          <p class="mb-3"><b>الاسم:</b> ${data.name}</p>
          <p class="mb-3"><b>المنتجات:</b> ${data.products}</p>
          <p><b>الإجمالي:</b> ${data.total} ج.م</p>
        </div>
      `;

    } else {

      result.innerHTML =
        "<p class='text-red-500'>حدث خطأ</p>";

    }

    delete window[callbackName];
    script.remove();
  };

  const script =
    document.createElement("script");

  script.src =
    sheetURL +
    "?orderId=" + encodeURIComponent(id) +
    "&callback=" + callbackName;

  script.onerror = function(){
    result.innerHTML =
      "<p class='text-red-500'>فشل الاتصال بالسيرفر</p>";
  };

  document.body.appendChild(script);
}
</script>

</body>
</html>
