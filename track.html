<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>تتبع الطلب</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center">

<div class="bg-white p-8 rounded-3xl shadow-xl w-full max-w-lg">

<h1 class="text-4xl font-black text-center mb-6">
تتبع الطلب
</h1>

<input
id="orderId"
placeholder="رقم الطلب"
class="w-full border p-4 rounded-xl mb-4 text-center">

<button
onclick="trackOrder()"
class="w-full bg-amber-700 text-white py-4 rounded-xl">
بحث
</button>

<div id="result" class="mt-6 text-center"></div>

</div>

<script>
const sheetURL =
"https://script.google.com/macros/s/رابطك/exec";

function trackOrder(){

const id =
document.getElementById("orderId").value;

const result =
document.getElementById("result");

result.innerHTML="جاري البحث...";

const cb =
"cb"+Date.now();

window[cb]=function(data){

if(data.result=="not_found"){
result.innerHTML="الطلب غير موجود";
}else{
result.innerHTML=
`
<p>الحالة: ${data.status}</p>
<p>الاسم: ${data.name}</p>
<p>المنتجات: ${data.products}</p>
<p>الإجمالي: ${data.total}</p>
`;
}

script.remove();
};

const script =
document.createElement("script");

script.src =
sheetURL +
"?orderId="+id+
"&callback="+cb;

document.body.appendChild(script);

}
</script>

</body>
</html>
