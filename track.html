<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>تتبع الطلب | Era&Art</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body{
  font-family:sans-serif;
  transition:.3s;
}

#google_translate_element{
  position:absolute;
  left:-9999px;
}

.goog-te-banner-frame,
.goog-te-balloon-frame,
.goog-te-menu-frame,
.skiptranslate{
  display:none !important;
}

body{
  top:0 !important;
}

.dark{
  background:#0f172a !important;
  color:white !important;
}

.dark .card{
  background:#1e293b !important;
  color:white !important;
}

.dark input,
.dark select{
  background:#334155 !important;
  color:white !important;
  border-color:#475569 !important;
}

.dark input::placeholder{
  color:#cbd5e1 !important;
}

.dark .resultBox{
  background:#334155 !important;
  color:white !important;
}
</style>
</head>

<body class="bg-gray-100 min-h-screen flex items-center justify-center p-4">

<div id="google_translate_element"></div>

<div class="card bg-white p-8 rounded-3xl shadow-xl w-full max-w-lg">

<div class="flex justify-between items-center mb-6">

<h1 class="text-3xl font-black">
تتبع الطلب
</h1>

<div class="flex gap-3 items-center">

<button
onclick="toggleDarkMode()"
class="text-2xl"
id="darkBtn">
🌙
</button>

<select
id="langSwitcher"
onchange="changeLanguage(this.value)"
class="border p-2 rounded-xl">

<option value="ar">العربية</option>
<option value="en">English</option>
<option value="fr">Français</option>
<option value="de">Deutsch</option>

</select>

</div>
</div>

<input
id="orderId"
type="text"
placeholder="رقم الطلب"
class="w-full border p-4 rounded-xl mb-4 text-center">

<button
onclick="trackOrder()"
class="w-full bg-amber-700 text-white py-4 rounded-xl font-black">
بحث
</button>

<div
id="result"
class="mt-6 text-center text-xl">
</div>

</div>

<script>
const sheetURL =
"https://script.google.com/macros/s/AKfycbxO-pvTB451KYuK7TmWRe5fO_vWfVyV4ln69lDN9h9ksksx_OqtPVTk2KLRPDBqBwGH1w/exec";


function googleTranslateElementInit(){
  new google.translate.TranslateElement({
    pageLanguage:"ar",
    includedLanguages:"ar,en,fr,de",
    autoDisplay:false
  },"google_translate_element");
}

function changeLanguage(lang){
  localStorage.setItem("siteLang",lang);
  document.cookie =
  "googtrans=/ar/" + lang + "; path=/";
  location.reload();
}

function toggleDarkMode(){
  document.body.classList.toggle("dark");

  const btn =
  document.getElementById("darkBtn");

  if(document.body.classList.contains("dark")){
    localStorage.setItem("darkMode","true");
    btn.innerText="☀️";
  }else{
    localStorage.setItem("darkMode","false");
    btn.innerText="🌙";
  }
}


/* عند التحميل */
document.addEventListener("DOMContentLoaded",function(){

  if(localStorage.getItem("darkMode")==="true"){
    document.body.classList.add("dark");
    document.getElementById("darkBtn").innerText="☀️";
  }

  const savedLang =
  localStorage.getItem("siteLang") || "ar";

  document.getElementById("langSwitcher").value =
  savedLang;

  if(savedLang !== "ar"){
    document.cookie =
    "googtrans=/ar/" + savedLang + "; path=/";
  }

  const params =
  new URLSearchParams(window.location.search);

  const autoId =
  params.get("orderId");

  if(autoId){
    document.getElementById("orderId").value =
    autoId;

    setTimeout(trackOrder,300);
  }

});


function trackOrder(){

  const input =
  document.getElementById("orderId");

  const result =
  document.getElementById("result");

  const id =
  input.value.trim();

  if(!id){
    result.innerHTML =
    "<p class='text-red-500'>أدخل رقم الطلب</p>";
    return;
  }

  result.innerHTML =
  "جاري البحث...";

  const callbackName =
  "cb_" + Date.now();

  window[callbackName] = function(data){

    if(data.result === "not_found"){

      result.innerHTML =
      "<p class='text-red-500'>الطلب غير موجود</p>";

    }else if(data.result === "found"){

      result.innerHTML = `
      <div class="resultBox bg-green-50 p-6 rounded-2xl text-right">
        <p class="mb-3"><b>رقم الطلب:</b> ${data.orderId}</p>
        <p class="mb-3"><b>الحالة:</b> ${data.status}</p>
        <p class="mb-3"><b>الاسم:</b> ${data.name}</p>
        <p class="mb-3"><b>المنتجات:</b> ${data.products}</p>
        <p><b>الإجمالي:</b> ${data.total} ج.م</p>
      </div>
      `;

    }else{
      result.innerHTML =
      "<p class='text-red-500'>حدث خطأ</p>";
    }

    delete window[callbackName];
    script.remove();
  };

  const script =
  document.createElement("script");

  script.src =
  sheetURL +
  "?orderId=" +
  encodeURIComponent(id) +
  "&callback=" +
  callbackName;

  script.onerror = function(){
    result.innerHTML =
    "<p class='text-red-500'>فشل الاتصال بالسيرفر</p>";
  };

  document.body.appendChild(script);
}
</script>

<script src="https://translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>

</body>
</html>
