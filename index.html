<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Era&Art</title>

<!-- Tailwind -->
<script src="https://cdn.tailwindcss.com"></script>

<!-- Font Awesome -->
<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

<!-- Google Font -->
<link
href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;900&display=swap"
rel="stylesheet">

<style>

body{
font-family:'Tajawal',sans-serif;
background:#f8f6f2;
}

</style>

</head>

<body>

<!-- HEADER -->

<header class="bg-white shadow sticky top-0 z-50">

<div class="container mx-auto px-6 py-4 flex justify-between items-center">

<div class="flex items-center gap-3">

<i class="fa-solid fa-couch text-3xl text-amber-700"></i>

<h1 class="text-3xl font-black">

Era&Art

</h1>

</div>

<button
onclick="toggleCart(true)"
class="relative">

<i class="fa-solid fa-bag-shopping text-2xl"></i>

<span
id="cart-count"
class="absolute -top-2 -right-2 bg-amber-700 text-white text-xs w-5 h-5 rounded-full flex items-center justify-center">

0

</span>

</button>

</div>

</header>

<!-- HERO -->

<section
class="h-[500px] bg-cover bg-center flex items-center text-white"
style="background-image:
linear-gradient(rgba(0,0,0,.5),rgba(0,0,0,.5)),
url('https://images.pexels.com/photos/276583/pexels-photo-276583.jpeg')">

<div class="container mx-auto px-6">

<h1 class="text-6xl font-black leading-tight">

أثاث فاخر
<br>
بتصميم عصري

</h1>

<p class="mt-5 text-lg">

أفضل الأثاث الحديث لمنزلك

</p>

</div>

</section>

<!-- PRODUCTS -->

<section class="container mx-auto px-6 py-20">

<h2 class="text-5xl font-black text-center mb-16">

المنتجات

</h2>

<div
id="products-container"
class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-8">

</div>

</section>

<!-- CART -->

<div
id="cartDrawer"
class="fixed inset-0 hidden z-50">

<!-- overlay -->

<div
onclick="toggleCart(false)"
class="absolute inset-0 bg-black/50">

</div>

<!-- drawer -->

<div
class="absolute left-0 top-0 h-full w-full max-w-md bg-white flex flex-col">

<!-- header -->

<div class="bg-slate-900 text-white p-5 flex justify-between items-center">

<h2 class="text-2xl font-black">

سلة الشراء

</h2>

<button
onclick="toggleCart(false)"
class="text-3xl">

×

</button>

</div>

<!-- items -->

<div
id="cart-items"
class="flex-1 overflow-y-auto p-5 space-y-5">

</div>

<!-- checkout -->

<div class="border-t p-5 bg-gray-50 space-y-4">

<input
id="customer-name"
type="text"
placeholder="الاسم"
class="w-full border p-3 rounded-lg">

<input
id="customer-phone"
type="text"
placeholder="رقم الهاتف"
class="w-full border p-3 rounded-lg">

<textarea
id="customer-address"
placeholder="العنوان"
class="w-full border p-3 rounded-lg h-24"></textarea>

<div class="flex justify-between text-2xl font-black">

<span>
الإجمالي
</span>

<span id="cart-total">
0 ج.م
</span>

</div>

<button
onclick="clearCart()"
class="w-full bg-red-500 text-white py-3 rounded-lg font-black">

إلغاء الطلب

</button>

<button
onclick="checkout()"
class="w-full bg-amber-700 text-white py-4 rounded-lg font-black">

إتمام الشراء

</button>

</div>

</div>

</div>

<script>

/* =========================
   رابط Google Script
========================= */

const scriptURL =
"https://script.google.com/macros/s/AKfycbzZoFu-QQz20ag-53oe1Fkt8vibCkeQQp5jiVVqX6jmuSUls-_oovA7OSDNHnjYXDmg/exec";

/* =========================
   رقم واتساب
========================= */

const whatsappNumber =
"201068130159";

/* =========================
   المنتجات
========================= */

let products = [

{
id:1,
name:"كنبة مودرن",
price:18000,
image:"https://images.pexels.com/photos/1866149/pexels-photo-1866149.jpeg",
desc:"كنبة فاخرة مودرن"
},

{
id:2,
name:"سرير فاخر",
price:25000,
image:"https://images.pexels.com/photos/1648768/pexels-photo-1648768.jpeg",
desc:"سرير بخامات ممتازة"
},

{
id:3,
name:"طاولة قهوة",
price:7000,
image:"https://images.pexels.com/photos/276528/pexels-photo-276528.jpeg",
desc:"طاولة عصرية"
},

{
id:4,
name:"كرسي مريح",
price:5000,
image:"https://images.pexels.com/photos/276534/pexels-photo-276534.jpeg",
desc:"كرسي مودرن مريح"
}

];

/* =========================
   السلة
========================= */

let cart =
JSON.parse(localStorage.getItem("cart")) || [];

/* حفظ السلة */

function saveCart(){

localStorage.setItem(
"cart",
JSON.stringify(cart)
);

}

/* فتح وغلق السلة */

function toggleCart(show){

const drawer =
document.getElementById("cartDrawer");

if(show){

drawer.classList.remove("hidden");

}else{

drawer.classList.add("hidden");

}

}

/* عرض المنتجات */

function renderProducts(){

const container =
document.getElementById("products-container");

container.innerHTML = "";

products.forEach(product=>{

container.innerHTML += `

<div class="bg-white rounded-2xl overflow-hidden shadow-xl">

<img
src="${product.image}"
class="w-full h-72 object-cover">

<div class="p-5">

<h3 class="text-2xl font-black mb-2">

${product.name}

</h3>

<p class="text-gray-500 mb-4">

${product.desc}

</p>

<div class="flex justify-between items-center">

<span class="text-amber-700 text-2xl font-black">

${product.price} ج.م

</span>

<button
onclick="addToCart(${product.id})"
class="bg-slate-900 text-white px-5 py-2 rounded-lg">

أضف للسلة

</button>

</div>

</div>

</div>

`;

});

}

/* إضافة للسلة */

function addToCart(id){

const product =
products.find(p=>p.id===id);

const existing =
cart.find(p=>p.id===id);

if(existing){

existing.qty++;

}else{

cart.push({
...product,
qty:1
});

}

saveCart();

updateCart();

toggleCart(true);

}

/* تحديث السلة */

function updateCart(){

const items =
document.getElementById("cart-items");

const totalEl =
document.getElementById("cart-total");

const count =
document.getElementById("cart-count");

items.innerHTML = "";

let total = 0;

count.innerText =
cart.reduce((sum,item)=>sum+item.qty,0);

if(cart.length===0){

items.innerHTML = `
<p class="text-center text-gray-500">
السلة فارغة
</p>
`;

}

cart.forEach(item=>{

total += item.price * item.qty;

items.innerHTML += `

<div class="border-b pb-4 flex gap-4">

<img
src="${item.image}"
class="w-24 h-24 object-cover rounded-lg">

<div class="flex-1">

<h3 class="font-black">

${item.name}

</h3>

<p class="text-amber-700 mt-2">

${item.price} ج.م

</p>

<div class="flex items-center gap-2 mt-3">

<button
onclick="decreaseQty(${item.id})"
class="bg-gray-200 w-8 h-8 rounded">

-

</button>

<span>

${item.qty}

</span>

<button
onclick="increaseQty(${item.id})"
class="bg-gray-200 w-8 h-8 rounded">

+

</button>

</div>

<button
onclick="removeItem(${item.id})"
class="text-red-500 text-sm mt-3">

حذف المنتج

</button>

</div>

</div>

`;

});

totalEl.innerText =
total + " ج.م";

}

/* زيادة كمية */

function increaseQty(id){

const item =
cart.find(p=>p.id===id);

item.qty++;

saveCart();

updateCart();

}

/* تقليل كمية */

function decreaseQty(id){

const item =
cart.find(p=>p.id===id);

item.qty--;

if(item.qty<=0){

cart =
cart.filter(p=>p.id!==id);

}

saveCart();

updateCart();

}

/* حذف منتج */

function removeItem(id){

cart =
cart.filter(p=>p.id!==id);

saveCart();

updateCart();

}

/* إلغاء الطلب */

function clearCart(){

cart = [];

saveCart();

updateCart();

}

/* إتمام الشراء */

async function checkout(){

if(cart.length===0){

alert("السلة فارغة");

return;

}

const name =
document.getElementById("customer-name").value;

const phone =
document.getElementById("customer-phone").value;

const address =
document.getElementById("customer-address").value;

if(!name || !phone || !address){

alert("املأ جميع البيانات");

return;

}

let total = 0;

let productsText = "";

let message =
`🛋️ طلب جديد من Era&Art

`;

cart.forEach(item=>{

total += item.price * item.qty;

productsText +=
`${item.name} × ${item.qty} | `;

message +=
`📦 ${item.name}
الكمية: ${item.qty}
السعر: ${item.price} ج.م

`;

});

message += `
👤 الاسم: ${name}

📞 الهاتف: ${phone}

📍 العنوان:
${address}

💰 الإجمالي:
${total} ج.م`;

/* إرسال لجوجل شيت */

try{

await fetch(scriptURL, {

method:"POST",

body: JSON.stringify({

name:name,
phone:phone,
address:address,
products:productsText,
total:total

})

});

}catch(err){

console.log(err);

}

/* واتساب */

const whatsappURL =
`https://wa.me/${whatsappNumber}?text=${encodeURIComponent(message)}`;

window.open(
whatsappURL,
"_blank"
);

/* تفريغ السلة */

cart = [];

saveCart();

updateCart();

alert("تم إرسال الطلب");

}

/* تشغيل الموقع */

window.onload = ()=>{

renderProducts();

updateCart();

};

</script>

</body>
</html>
