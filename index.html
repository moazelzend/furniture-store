<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<title>Era&art | للأثاث الفاخر</title>

<!-- Tailwind -->
<script src="https://cdn.tailwindcss.com"></script>

<!-- Font -->
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;900&display=swap" rel="stylesheet">

<!-- Icons -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>

body{
    font-family:'Tajawal',sans-serif;
    background:#f8f6f2;
}

</style>

</head>

<body class="text-slate-800">

<!-- Toast -->
<div id="toast-container"
class="fixed top-5 left-5 z-50 space-y-2">
</div>

<!-- Header -->
<header class="bg-white shadow sticky top-0 z-40">

<div class="container mx-auto px-6 py-4 flex justify-between items-center">

<h1 class="text-2xl font-black">
Era&art
</h1>

<button
onclick="toggleCart(true)"
class="relative">

<i class="fa-solid fa-cart-shopping text-2xl"></i>

<span
id="cart-badge"
class="absolute -top-2 -right-2 bg-red-500 text-white text-xs w-5 h-5 rounded-full flex items-center justify-center">

0

</span>

</button>

</div>

</header>

<!-- Hero -->
<section class="h-[400px] flex items-center justify-center bg-black text-white text-center">

<div>

<h2 class="text-5xl font-black mb-5">
أثاث فاخر لمنزلك
</h2>

<p class="text-lg">
تصميمات مودرن فاخرة بجودة عالية
</p>

</div>

</section>

<!-- Products -->
<section class="container mx-auto px-6 py-16">

<h2 class="text-3xl font-black mb-10 text-center">
المنتجات
</h2>

<div
id="store-products"
class="grid grid-cols-1 md:grid-cols-3 gap-8">

</div>

</section>

<!-- Cart -->
<div
id="cart-drawer"
class="hidden fixed inset-0 bg-black/50 z-50">

<div class="bg-white w-full max-w-md h-full p-6 overflow-y-auto">

<div class="flex justify-between items-center mb-6">

<h3 class="text-2xl font-bold">
السلة
</h3>

<button onclick="toggleCart(false)">
✕
</button>

</div>

<div id="cart-items"></div>

<div class="mt-6">

<h4 class="font-bold text-xl mb-4">

الإجمالي:
<span id="cart-total">
0 جنيه
</span>

</h4>

<form onsubmit="handleCheckout(event)">

<input
id="cust-name"
type="text"
placeholder="الاسم"
required
class="w-full border p-3 mb-3">

<input
id="cust-phone"
type="text"
placeholder="رقم الهاتف"
required
class="w-full border p-3 mb-3">

<textarea
id="cust-address"
placeholder="العنوان"
required
class="w-full border p-3 mb-3"></textarea>

<button
type="submit"
class="bg-black text-white w-full py-3">

إرسال الطلب

</button>

</form>

</div>

</div>

</div>

<!-- Footer -->
<footer class="bg-black text-white text-center py-8">

<p>
جميع الحقوق محفوظة © 2026
</p>

</footer>

<!-- Supabase -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>

// ===============================
// إعداد Supabase
// ===============================

const supabaseUrl =
'https://cyhigbqcnxiqzsdttteq.supabase.co';

const supabaseKey =
'sb_publishable_q5IJNJp5GX8QwEJEq0tWew_jwsOMwdz';

const { createClient } = window.supabase;

const db = createClient(
    supabaseUrl,
    supabaseKey
);

// ===============================
// بيانات الموقع
// ===============================

let products = [];
let cart = [];

// ===============================
// تحميل المنتجات من Supabase
// ===============================

async function loadProductsFromSupabase(){

const { data, error } = await db
.from('products')
.select('*');

if(error){

console.log(error);

showToast('فشل تحميل المنتجات');

return;

}

products = data || [];

renderAll();

}

// ===============================
// حفظ السلة
// ===============================

function updateStorage(){

localStorage.setItem(
'f_cart',
JSON.stringify(cart)
);

renderAll();

}

// ===============================
// تحميل السلة
// ===============================

function loadCart(){

const savedCart =
localStorage.getItem('f_cart');

cart = savedCart
? JSON.parse(savedCart)
: [];

}

// ===============================
// Toast
// ===============================

function showToast(message){

const toast =
document.createElement('div');

toast.className =
'bg-black text-white px-4 py-3 rounded shadow';

toast.innerText = message;

document
.getElementById('toast-container')
.appendChild(toast);

setTimeout(()=>{
toast.remove();
},3000);

}

// ===============================
// رسم المنتجات
// ===============================

function renderAll(){

const container =
document.getElementById('store-products');

if(!container) return;

container.innerHTML = '';

products.forEach(product=>{

container.innerHTML += `

<div class="bg-white rounded shadow overflow-hidden">

<img
src="${product.image}"
class="w-full h-64 object-cover">

<div class="p-5">

<h3 class="font-bold text-xl mb-2">
${product.name}
</h3>

<p class="text-gray-500 mb-4">
${product.description || product.desc || ''}
</p>

<div class="font-bold text-2xl mb-4">
${product.price} جنيه
</div>

<button
onclick="addToCart(${product.id})"
class="bg-black text-white w-full py-3">

أضف للسلة

</button>

</div>

</div>

`;

});

updateCartUI();

}

// ===============================
// إضافة للسلة
// ===============================

function addToCart(id){

const product =
products.find(p=>p.id===id);

if(!product) return;

const existing =
cart.find(i=>i.id===id);

if(existing){

existing.qty++;

}else{

cart.push({
...product,
qty:1
});

}

updateStorage();

showToast('تمت إضافة المنتج');

}

// ===============================
// تحديث السلة
// ===============================

function updateCartUI(){

const items =
document.getElementById('cart-items');

if(!items) return;

items.innerHTML = '';

let total = 0;

cart.forEach(item=>{

total += item.price * item.qty;

items.innerHTML += `

<div class="border-b pb-3 mb-3">

<h4 class="font-bold">
${item.name}
</h4>

<p>
${item.qty} × ${item.price}
</p>

<button
onclick="removeFromCart(${item.id})"
class="text-red-500">

حذف

</button>

</div>

`;

});

document.getElementById(
'cart-total'
).innerText = total + ' جنيه';

document.getElementById(
'cart-badge'
).innerText = cart.reduce(
(sum,item)=>sum+item.qty,
0
);

}

// ===============================
// حذف من السلة
// ===============================

function removeFromCart(id){

cart = cart.filter(
item=>item.id!==id
);

updateStorage();

}

// ===============================
// فتح وغلق السلة
// ===============================

function toggleCart(show){

const drawer =
document.getElementById('cart-drawer');

if(show){

drawer.classList.remove('hidden');

}else{

drawer.classList.add('hidden');

}

}

// ===============================
// إرسال الطلب
// ===============================

async function handleCheckout(e){

e.preventDefault();

if(cart.length===0){

showToast('السلة فارغة');

return;

}

const name =
document.getElementById('cust-name').value;

const phone =
document.getElementById('cust-phone').value;

const address =
document.getElementById('cust-address').value;

const total =
cart.reduce(
(sum,item)=>
sum + item.price * item.qty,
0
);

// حفظ الطلب في Supabase

const { error } = await db
.from('orders')
.insert([

{
customer_name:name,
phone:phone,
address:address,
total:total
}

]);

if(error){

console.log(error);

showToast('فشل إرسال الطلب');

return;

}

// رسالة واتساب

const text = cart.map(item=>

`${item.name} × ${item.qty}`

).join('\n');

window.open(

`https://wa.me/201068130159?text=${encodeURIComponent(
`طلب جديد\n\nالاسم: ${name}\nالهاتف: ${phone}\nالعنوان: ${address}\n\nالمنتجات:\n${text}\n\nالإجمالي: ${total} جنيه`
)}`,

'_blank'

);

// تفريغ السلة

cart = [];

updateStorage();

toggleCart(false);

e.target.reset();

showToast('تم إرسال الطلب بنجاح');

}

// ===============================
// تشغيل الموقع
// ===============================

window.onload = async ()=>{

loadCart();

await loadProductsFromSupabase();

};

</script>

</body>
</html>
