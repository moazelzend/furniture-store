<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Era&Art | للأثاث الفاخر</title>

<!-- Tailwind -->
<script src="https://cdn.tailwindcss.com"></script>

<!-- Google Font -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link
href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;900&display=swap"
rel="stylesheet">

<!-- Font Awesome -->
<link
rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
/>

<script>

tailwind.config = {

theme: {

extend: {

colors: {

brand: {

dark: '#0f172a',
gold: '#d4a373',
light: '#f8f6f2'

}

},

fontFamily: {

sans: ['Tajawal', 'sans-serif']

}

}

}

}

</script>

<style>

body{
font-family:'Tajawal',sans-serif;
background:#f8f6f2;
}

html{
scroll-behavior:smooth;
}

</style>

</head>

<body class="text-slate-800">

<!-- Header -->

<header class="sticky top-0 z-40 bg-white shadow-sm">

<div class="container mx-auto px-6 py-4 flex justify-between items-center">

<div class="flex items-center gap-3">

<i class="fa-solid fa-couch text-3xl text-brand-gold"></i>

<h1 class="text-3xl font-black">
Era&Art
</h1>

</div>

<!-- Cart -->

<button
onclick="toggleCart(true)"
class="relative">

<i class="fa-solid fa-bag-shopping text-2xl"></i>

<span
id="cart-badge"
class="absolute -top-2 -right-2 bg-brand-gold text-white w-5 h-5 text-xs rounded-full flex items-center justify-center">

0

</span>

</button>

</div>

</header>

<!-- Hero -->

<section
class="relative h-[500px] bg-cover bg-center flex items-center text-white"
style="background-image:
linear-gradient(rgba(0,0,0,.5),rgba(0,0,0,.5)),
url('https://images.pexels.com/photos/276583/pexels-photo-276583.jpeg');">

<div class="container mx-auto px-6">

<h1 class="text-6xl font-black leading-tight">

أثاث فاخر
<br>
لمنزل عصري

</h1>

<p class="mt-6 text-lg text-gray-200 max-w-xl">

أفضل تصميمات الأثاث الأوروبية الحديثة

</p>

</div>

</section>

<!-- Products -->

<section class="container mx-auto px-6 py-20">

<div
id="store-products"
class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-8">

</div>

</section>

<!-- Cart Drawer -->

<div
id="cart-drawer"
class="fixed inset-0 hidden z-50">

<!-- Overlay -->

<div
onclick="toggleCart(false)"
class="absolute inset-0 bg-black/50">

</div>

<!-- Drawer -->

<div
class="absolute left-0 top-0 h-full w-full max-w-md bg-white flex flex-col">

<div class="bg-brand-dark text-white p-6 flex justify-between items-center">

<h2 class="text-2xl font-black">

سلة الشراء

</h2>

<button
onclick="toggleCart(false)"
class="text-3xl">

×

</button>

</div>

<!-- Cart Items -->

<div
id="cart-items"
class="flex-1 overflow-y-auto p-6 space-y-4">

</div>

<!-- Footer -->

<div class="border-t p-6">

<div class="flex justify-between text-2xl font-black mb-6">

<span>
الإجمالي
</span>

<span id="cart-total">
0 ج.م
</span>

</div>

<button
onclick="checkout()"
class="w-full bg-brand-gold text-black py-4 font-black rounded-lg">

إتمام الشراء

</button>

</div>

</div>

</div>

<script>

/* =========================
   رابط Google Sheet
========================= */

const scriptURL =
"https://script.google.com/macros/s/AKfycbyTYZDfWRel_slqIvt36bhl5xuAFYlEzhbIoHduEMZe1O7ad_0U-dKkne9GTyFzgtGl/exec";

/* =========================
   رقم واتساب
========================= */

const phone =
"201068130159";

/* =========================
   المنتجات
========================= */

let products = [

{
id:1,
name:"كنبة مودرن",
price:18500,
image:"https://images.pexels.com/photos/1866149/pexels-photo-1866149.jpeg",
desc:"كنبة فاخرة بتصميم عصري"
},

{
id:2,
name:"طاولة قهوة",
price:7200,
image:"https://images.pexels.com/photos/276528/pexels-photo-276528.jpeg",
desc:"طاولة أنيقة"
},

{
id:3,
name:"سرير فاخر",
price:26000,
image:"https://images.pexels.com/photos/1648768/pexels-photo-1648768.jpeg",
desc:"سرير ملكي"
},

{
id:4,
name:"كرسي مريح",
price:5400,
image:"https://images.pexels.com/photos/276534/pexels-photo-276534.jpeg",
desc:"كرسي مودرن"
}

];

/* =========================
   السلة
========================= */

let cart = [];

/* =========================
   فتح وغلق السلة
========================= */

function toggleCart(show){

const drawer =
document.getElementById("cart-drawer");

if(show){

drawer.classList.remove("hidden");

} else {

drawer.classList.add("hidden");

}

}

/* =========================
   إضافة للسلة
========================= */

function addToCart(id){

const product =
products.find(item => item.id === id);

const existing =
cart.find(item => item.id === id);

if(existing){

existing.qty++;

} else {

cart.push({
...product,
qty:1
});

}

updateCart();

}

/* =========================
   تحديث السلة
========================= */

function updateCart(){

const badge =
document.getElementById("cart-badge");

const items =
document.getElementById("cart-items");

const totalEl =
document.getElementById("cart-total");

badge.innerText =
cart.reduce((sum,item)=>sum+item.qty,0);

items.innerHTML = "";

let total = 0;

if(cart.length === 0){

items.innerHTML = `
<p class="text-center text-gray-500">
السلة فارغة
</p>
`;

}

cart.forEach(item => {

total += item.price * item.qty;

items.innerHTML += `

<div class="flex gap-4 border-b pb-4">

<img
src="${item.image}"
class="w-24 h-24 object-cover rounded-lg">

<div>

<h3 class="font-black">
${item.name}
</h3>

<p class="text-brand-gold mt-2">
${item.price} ج.م
</p>

<p class="text-sm text-gray-500 mt-2">
الكمية: ${item.qty}
</p>

</div>

</div>

`;

});

totalEl.innerText =
total + " ج.م";

}

/* =========================
   إتمام الشراء
========================= */

async function checkout(){

if(cart.length === 0){

alert("السلة فارغة");

return;

}

const name =
prompt("ادخل الاسم");

if(!name) return;

const phoneNumber =
prompt("ادخل رقم الهاتف");

if(!phoneNumber) return;

const address =
prompt("ادخل العنوان");

if(!address) return;

let total = 0;

let productsText = "";

let message =
`🛋️ طلب جديد من متجر Era&Art

`;

cart.forEach(item => {

total += item.price * item.qty;

productsText +=
`${item.name} × ${item.qty} | `;

message +=
`📦 ${item.name}
الكمية: ${item.qty}
السعر: ${item.price} ج.م

`;

});

message += `
👤 الاسم: ${name}

📞 الهاتف: ${phoneNumber}

📍 العنوان:
${address}

💰 الإجمالي: ${total} ج.م`;

/* إرسال إلى Google Sheet */

try {

await fetch(scriptURL, {

method:"POST",

mode:"no-cors",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

name:name,
phone:phoneNumber,
address:address,
products:productsText,
total:total

})

});

} catch(err){

console.log(err);

}

/* واتساب */

const url =
`https://wa.me/${phone}?text=${encodeURIComponent(message)}`;

location.href = url;

}

/* =========================
   عرض المنتجات
========================= */

function renderProducts(){

const container =
document.getElementById("store-products");

container.innerHTML = "";

products.forEach(product => {

container.innerHTML += `

<div class="bg-white shadow-xl overflow-hidden rounded-2xl">

<div class="overflow-hidden h-72">

<img
src="${product.image}"
class="w-full h-full object-cover hover:scale-110 transition duration-500">

</div>

<div class="p-5">

<h3 class="text-2xl font-black mb-2">
${product.name}
</h3>

<p class="text-gray-500 mb-4">
${product.desc}
</p>

<div class="flex justify-between items-center">

<span class="text-brand-gold text-2xl font-black">

${product.price} ج.م

</span>

<button
onclick="addToCart(${product.id})"
class="bg-brand-dark text-white px-5 py-2 rounded-lg">

أضف للسلة

</button>

</div>

</div>

</div>

`;

});

}

/* =========================
   تشغيل الموقع
========================= */

window.onload = () => {

renderProducts();

updateCart();

};

</script>

</body>
</html>
